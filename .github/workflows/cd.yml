name: "Continuous Deployment"

on:
  push:
    branches:
      - main

env:
  GITHUB_USER: github-actions
  GITHUB_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}

jobs:
  cd:
    name: "Continuous Deployment"
    runs-on: ubuntu-latest
    environment: validationTenant

    steps:
      - name: " check out repo"
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: "☕ setup java"
        uses: actions/setup-java@v4
        id: setup-java
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: "🐘 setup gradle"
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.14'

      - name: "🦑 package deploy artifact"
        run: gradle createArchive
        env:
          SOCOTRA_KERNEL_API_URL: ${{ vars.SOCOTRA_KERNEL_API_URL }}
          SOCOTRA_KERNEL_ACCESS_TOKEN: ${{ secrets.SOCOTRA_KERNEL_ACCESS_TOKEN }}
          SOCOTRA_KERNEL_TENANT_LOCATOR: ${{ secrets.SOCOTRA_KERNEL_TENANT_LOCATOR }}

      - name: "📁 attach deploy artifact"
        uses: actions/upload-artifact@v4
        with:
          name: config-zip
          path: config.zip
          overwrite: true

      - name: "🐍 setup python/uv"
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          

      - name: "set release tag"
        run: echo "DATE_TAG=v$(date +'%Y%m%d.%H%M%S')" >> "$GITHUB_ENV"

      - name: "create release"
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.CI_GITHUB_TOKEN }}   
          name: Release ${{ env.DATE_TAG }}
          tag: ${{ env.DATE_TAG }}
          commit: main
          artifacts: "config.zip"
          artifactContentType: "application/zip"

      - name: "🤖 deploy config to tenant"
        run: uv run scripts/deploy.py config.zip --overwrite
        env:
          SOCOTRA_KERNEL_API_URL: ${{ vars.SOCOTRA_KERNEL_API_URL }}
          SOCOTRA_KERNEL_ACCESS_TOKEN: ${{ secrets.SOCOTRA_KERNEL_ACCESS_TOKEN }}
          SOCOTRA_KERNEL_TENANT_LOCATOR: ${{ secrets.SOCOTRA_KERNEL_TENANT_LOCATOR }}