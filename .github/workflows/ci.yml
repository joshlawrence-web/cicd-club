name: "Continuous Integration"
on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
  push:
    branches:
      - main

env:
  GITHUB_USER: github-actions
  GITHUB_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}

jobs:
  ci:
    name: "Continuous Integration"
    runs-on: ubuntu-latest

    steps:
      - name: "🧑‍💻 check out repo"
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: "☕ setup java"
        uses: actions/setup-java@v4
        id: setup-java
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: "🐘 setup gradle"
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.14'

      - name: "🔄 refresh reference datamodel"
        run: gradle refreshReferenceDatamodel
        env:
          SOCOTRA_KERNEL_API_URL: ${{ vars.SOCOTRA_KERNEL_API_URL }}
          SOCOTRA_KERNEL_ACCESS_TOKEN: ${{ secrets.SOCOTRA_KERNEL_ACCESS_TOKEN }}
          SOCOTRA_KERNEL_TENANT_LOCATOR: ${{ secrets.SOCOTRA_KERNEL_TENANT_LOCATOR }}

      - name: "🗿️ run tests"
        run: gradle test
        env:
          SOCOTRA_KERNEL_API_URL: ${{ vars.SOCOTRA_KERNEL_API_URL }}
          SOCOTRA_KERNEL_ACCESS_TOKEN: ${{ secrets.SOCOTRA_KERNEL_ACCESS_TOKEN }}
          SOCOTRA_KERNEL_TENANT_LOCATOR: ${{ secrets.SOCOTRA_KERNEL_TENANT_LOCATOR }}